<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>South African Provinces Table</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid black;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
    </style>
  </head>
  <body>
    <h2>South African Province Statistics</h2>

    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Province</th>
          <th>Population (2011)</th>
          <th>Area (km²)</th>
          <th>Density (per km²)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>1</strong></td>
          <td>Gauteng</td>
          <td>12,272,263</td>
          <td>18,178</td>
          <td>675.1</td>
        </tr>
        <tr>
          <td><strong>2</strong></td>
          <td>KwaZulu-Natal</td>
          <td>10,267,300</td>
          <td>120,361</td>
          <td>85.3</td>
        </tr>
        <tr>
          <td><strong>3</strong></td>
          <td>Mpumalanga</td>
          <td>4,039,939</td>
          <td>76,495</td>
          <td>52.8</td>
        </tr>
        <tr>
          <td><strong>4</strong></td>
          <td>Western Cape</td>
          <td>5,822,734</td>
          <td>129,462</td>
          <td>45.0</td>
        </tr>
        <tr>
          <td><strong>5</strong></td>
          <td>Limpopo</td>
          <td>5,404,868</td>
          <td>125,755</td>
          <td>43.0</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
